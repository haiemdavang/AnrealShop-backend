name: CI/CD Deploy Backend

on:
  push:
    branches: [ "main" ]
#  pull_request:
#    branches: [ "main" ]

jobs:

  build-and-push:
      runs-on: ubuntu-latest 
      permissions:
        contents: read
        packages: write
        
      steps:
          - name: Checkout code
            uses: actions/checkout@v4
            
          - name: Log in to GHCR
            uses: docker/login-action@v3
            with:
              registry: ghcr.io
              username: haiemdavang
              password: ${{ secrets.GH_PAT }}

          - name: Build and push Docker image
            uses: docker/build-push-action@v5
            with:
              context: .
              file: ./Dockerfile
              push: true
              tags: ghcr.io/haiemdavang/anrealshop-backend:latest
          - name: Send Telegram Message on Build Failure
            if: failure()
            run: |
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="❌ [Lỗi Cấp Cứu] Đóng gói Docker thất bại tại ${{ github.repository }}!
              👤 Người gây nghiệp: ${{ github.actor }}
              🔍 Bấm vào đây để xem Log lỗi chi tiết ngay lập tức:
              🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
  deploy:
      runs-on: ubuntu-latest
      needs: build-and-push 

      steps:
            - name: Deploy to DigitalOcean Droplet
              uses: appleboy/ssh-action@master
              with:
                host: ${{ secrets.HOST_IP }} 
                username: ${{ secrets.SSH_USER }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}

                script: |
                  # 1. Đi tới thư mục dự án trên Droplet
                  cd /root/AnrealShop-backend
                  
                  # 2. Đăng nhập vào GHCR (để PULL image)
                  echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u haiemdavang --password-stdin
                  
                  # 3. Kéo (pull) image mới nhất
                  docker compose -f docker-compose-app.yml pull backend-app
                  
                  # 4. Khởi động lại service 'backend-app' với image mới
                  docker compose -f docker-compose-app.yml up -d --no-deps backend-app
                  
                  # 5. (Tùy chọn) Xóa các image rác để tiết kiệm dung lượng
                  docker image prune -f
            - name: Send Telegram Message on Success
              if: success()
              run: |
                curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                -d text="✅ [Thành công] Server Ubuntu đã cập nhật Code mới nhất cho dự án ${{ github.repository }}! (Người push code: ${{ github.actor }})"
            - name: Send Telegram Message on Deploy Failure
              if: failure()
              run: |
                curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                -d text="⚠️ [Cảnh báo Server] Deploy lên Droplet thất bại! 
                Có thể do lỗi mạng, sai mật khẩu, hoặc container đang bị crash.
                🔍 Bấm vào link này để đọc log SSH:
                🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
