server:
  forward-headers-strategy: framework
  base_url: https://api.haiemdavang.id.vn
  fe:
    base_url: https://shop.haiemdavang.id.vn
    oauth2:
      redirect-uri: ${server.fe.base_url}/login
  servlet:
    session:
      cookie:
        domain: haiemdavang.id.vn

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_anrealshop_test}?prepareThreshold=0
    username: ${DB_USERNAME:haiemdavang}
    password: ${DB_PASSWORD:haiemdavang}
    driver-class-name: org.postgresql.Driver
  jpa:
#    open-in-view: false
    show-sql: false
    hibernate:
        ddl-auto: none
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_updates: true
        order_inserts: true

  data:
    redis:
      url: ${REDIS_URL}
  mail:
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_HOST}:${KAFKA_PORT:9092}
    consumer:
      properties:
        max.poll.interval.ms: 900000
        session.timeout.ms: 60000
        heartbeat.interval.ms: 15000
        fetch.max.wait.ms: 500
        max.poll.records: 5
  elasticsearch:
    uris: http://${ES_HOST}:${ES_PORT}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GG_CLIENT_ID}
            client-secret: ${GG_CLIENT_SECRET}
            redirect-uri: ${server.base_url}${GG_URL_REDIRECT:/oauth2/callback/google}
            scope:
              - email
              - profile

logging:
  level:
    root: INFO
    com.haiemdavang.AnrealShop.aspect.LoggingAspect: WARN
    org.apache.kafka.clients.consumer.ConsumerConfig: WARN    # Tắt log in cấu hình Consumer
    org.apache.kafka.clients.admin.AdminClientConfig: WARN    # Tắt log in cấu hình AdminClient
    org.apache.kafka.clients.producer.ProducerConfig: WARN    # Tắt log in cấu hình Producer
    org.hibernate.jpa.internal.util.LogHelper: WARN           # Tắt log PersistenceUnitInfo
    org.hibernate.Version: WARN

payment:
  vnPay:
    url: ${VNP_URL}
    returnUrl: ${server.base_url}/api/public/vnpay/payment-callback
    tmnCode: ${VNP_TMCODE}
    secretKey: ${VNP_SECRET_KEY}
    version: ${VNP_VER}
    command: ${VNP_COMD}
    orderType: ${VNP_TYPE}
    timeExpire: ${VNP_MAX_TIME}

jwt:
  token:
    secret_Key: ${JWT_SECRET_KEY}

